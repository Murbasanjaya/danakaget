<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Update Required</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#ffffff;
      color:#000;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:380px;
      border:2px solid #000;
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:8px 8px 0px #000;
    }

    .logo{
      width:80px;
      height:80px;
      border-radius:20px;
      background:#000;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:auto;
      font-size:30px;
      font-weight:bold;
    }

    h1{
      margin-top:20px;
      font-size:28px;
    }

    p{
      margin-top:12px;
      color:#444;
      line-height:1.5;
      font-size:15px;
    }

    .version{
      margin-top:15px;
      font-weight:bold;
      font-size:16px;
    }

    .btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:14px;
      margin-top:18px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.2s;
    }

    .update{
      background:#000;
      color:#fff;
    }

    .copy{
      background:#f2f2f2;
      color:#000;
      border:2px solid #000;
    }

    .btn:active{
      transform:scale(0.96);
    }

    .link-box{
      margin-top:15px;
      background:#f5f5f5;
      border-radius:12px;
      padding:10px;
      font-size:13px;
      word-break:break-all;
      border:1px solid #ddd;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="logo">N</div>

    <h1>Update Required</h1>

    <p>
      Versi aplikasi kamu sudah lama.
      Silahkan update ke versi terbaru agar aplikasi dapat digunakan kembali.
    </p>

    <div class="version">
      Latest Version: 1.10
    </div>

    <div class="link-box" id="link">
      https://nexorain.my.id/
    </div>

    <button class="btn update"
      onclick="window.location.href='https://nexorain.my.id/'">
      UPDATE SEKARANG
    </button>

    <button class="btn copy" onclick="copyLink()">
      COPY LINK
    </button>
  </div>

  <script>
    function copyLink() {
      const text = "https://nexorain.my.id/";

      navigator.clipboard.writeText(text).then(() => {
        alert("Link berhasil disalin!");
      });
    }
  </script>

</body>
</html>
