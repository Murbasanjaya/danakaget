<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>NEXORAIN BUG VIP - SIMULATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    -webkit-tap-highlight-color: transparent;
}
body {
    width: 100%; height: 100vh; background: #050505; color: #fff;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; position: relative;
}
/* Background Utama */
#bgVideo {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0; pointer-events: none;
    filter: grayscale(100%) brightness(23%) contrast(110%);
}
.grid {
    position: absolute; inset: 0; z-index: 1; opacity: .5;
    background-image: linear-gradient(rgba(255, 255, 255, .02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .02) 1px, transparent 1px);
    background-size: 42px 42px;
}

.panel-container {
    position: relative; z-index: 5; width: 95%; max-width: 460px;
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
    border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px;
    padding: 24px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
}

.account-info-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 10px 16px; border-radius: 16px; margin-bottom: 20px; font-size: 11px;
}
.user-details span { color: #888; }
.user-details strong { color: #fff; font-weight: 600; text-transform: uppercase; }
.btn-logout {
    background: transparent; border: none; color: #666; cursor: pointer;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s;
}
.btn-logout:hover { color: #fff; }

.panel-header { text-align: center; margin-bottom: 16px; }
.panel-header h1 { font-size: 26px; font-weight: 800; letter-spacing: 4px; text-shadow: 0 0 30px rgba(255, 255, 255, 0.2); text-transform: uppercase; }
.panel-header p { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

/* Video Preview di Atas Form Input Target */
.target-video-box {
    width: 100%; height: 140px; background: #0a0a0c;
    border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 18px;
    overflow: hidden; margin-bottom: 16px; position: relative;
}
.target-video-box video {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(100%) brightness(60%);
}

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

.input-style {
    width: 100%; padding: 14px 16px; background: #111113;
    border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px;
    color: #fff; font-size: 13px; outline: none; transition: all 0.25s ease;
}
.input-style:focus { border-color: rgba(255, 255, 255, 0.25); background: #151518; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-fire {
    width: 100%; padding: 15px; background: #ffffff; color: #000000;
    border: none; border-radius: 16px; font-size: 13px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    box-shadow: 0 4px 25px rgba(255, 255, 255, 0.08); transition: all 0.25s; margin-top: 6px;
}
.btn-fire:hover { transform: translateY(-1px); background: #eaeaea; }
.btn-fire:disabled { background: #1a1a1c; color: #555; box-shadow: none; cursor: not-allowed; }

.terminal-box {
    margin-top: 18px; background: #0a0a0c; border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 14px; padding: 12px; height: 115px; overflow-y: auto;
}
.terminal-box::-webkit-scrollbar { width: 0px; }
.term-line { font-family: 'Fira Code', monospace; font-size: 11px; color: #777; margin-bottom: 4px; line-height: 1.4; }
.term-success { color: #ffffff; font-weight: 600; }
.term-process { color: #b5b5b5; }
.term-warning { color: #444; text-decoration: line-through; }

.shake { animation: shakeEffect 0.35s ease; }
@keyframes shakeEffect {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-5px); }
    40%, 80% { transform: translateX(5px); }
}
</style>
</head>
<body>

<script>
// Validasi Session Proteksi Halaman
if (localStorage.getItem("isAuth") !== "true") {
    window.location.href = "login.html";

</script>

<video autoplay muted loop playsinline id="bgVideo">

<div class="grid"></div>

<script>

function switchTargetLabel() {

    const consoleBox = document.getElementById('terminalLog');
    const line = document.createElement('div');
    line.className = `term-line ${type}`;
    line.innerText = `> ${text}`;
    consoleBox.appendChild(line);
    consoleBox.scrollTop = consoleBox.scrollHeight;
}

function startFakeAttack(e) {
    e.preventDefault();
    
    const targetCategory = document.getElementById('targetType').value;

        if(currentSend <= 4) {
            writeLog(`Simulating payload packet [${currentSend}/${count}] straight to stack queue...`, "term-process");
            currentSend++;

            clearInterval(intervalSend);

        writeLog("PROCESS TERMINATED: VISUAL SIMULATION TERMINATED", "term-success");

        setTimeout(() => {

            btn.innerText = "Execute Action";

function logoutAccount() {
    localStorage.removeItem("isAuth");
    localStorage.removeItem("userName");
    localStorage.removeItem("userRole");
    window.location.href = "login.html";
}
</script>

</html>
