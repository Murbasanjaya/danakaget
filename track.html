<script>

const canvas   = document.getElementById('canvas-grafis');
const ctx      = canvas.getContext('2d');
const btnStart = document.getElementById('aktifkan-sensor');
const overlay  = document.getElementById('overlay-ijin');

const MAX_P    = 180;

  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаЦтаГтаАтаАтаАтбБтаАтаАтаАтаАтаАтаРтаЖтаАтаАтаАтаАтаАтаАтаБтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтбатвФтбдтаКтаБтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаБтаАтаАтаАтаБтаАтаАтаШтаБтвАтаАтаАтаАтаАтвИтаУтаВтаатбДтаАтаИтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтвАтгатг╢та┐таЮтаЛтаБтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаТтаБтаАтаатбЪтаБтвАтгЩтгАтгИтбйтамтвБтаАтвСта╢тадтбЖтадтбАтаАтаАтаАтаАтаАтвАта┤тв▓тгЛтг╜тг╖таЯтаГтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаБтаАтватаАтаАтг╢таГтаЧтгбтг╢тготг┐тб┐та┐та┐тв┐тг┐тг╖тг╢тгдтгдтадта┤тажтамтгдтгдтаДтгЙтаЙтаЭтв▓тг┐тб╖та╗таВтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаИтаАтаАтаАтаАтаБтбАтб╕таБтг░тг┐тб┐таЫтаЛтгБтбАтадтадтвДтбАтаИтаЫтвптг┐тгЯтг╛тг╢тг╢тготгнтг╡тг╛тг┐тгЯта┐таЙтвитаЦтаГтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",

  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаБтвШтбДтаШтг┐тг┐таАта╕тбАтаАтаАтаАтвАтгАтг┤тг╛тг┐тб┐тбЯтбЛтаРтбЗтаАтв╕тг┐тг┐таГтаАтаБтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтвбтаШтв░тг┐тб┐тбЖтаАтгЗтаАтгАтгатгдтг╢тг┐тв╖твЯта╗таАтаИтаАтаАтаАтбЗтаАтг╝тг┐тг┐таВтаАтбАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтвАтаФтвАтб┤твптг╛таЯтбПтвАтгатг┐тг┐тг┐тгЯтвЯтбЛтаЕтаШтаЙтаАтаАтаАтаАтвАтаАтаБтватг┐тгЯтаГтаАтаБтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтватаЮтг╗тг╖тб┐твЩтгйтг╢тб┐та┐таЫтаЙтаСтвбтбБтаАтаАтаАтаАтаАтвАтаФтаБтаАтг░тг┐тг┐тбЯтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаАтаАтаАтгбтг╛тгетг╛твлтбжта╛таЫтаЩтаЙтаАтвАтгАтаАтаИтаЩтаУтажтадтадтаАтаШтаБтвАтбдтг╛тб┐таПтаБтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтаАтаАтаАтаАтаАтаФтг┤тг╛тг┐тг┐твЯтвЭтавтаГтвАтгдтв┤тг╛тготг╖тг╢тв┐тг╢тбдтгРтбАтаАтгатгдтв╢тгктг┐тг┐тб┐таЯтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "таАтбАтгжтг╛тб┐тбЫта╡та║твИтбата╢та┐таетаетбнтаЙтаЙтв▒тбЫта╗та┐тг┐тг┐тг┐тг┐тг┐та┐та┐та┐таЯтантаЫтаВтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "твАтв┤таХтгЛтаЭтаХтаРтаАтаФтаЙтаАтаАтаАтаБтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаЙтаБтаЙтаБтаБтаБтаБтаИтаАтаБтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
  "тгатаБтаИтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаАтаА",
];

function generateAsciiFrames(source) {
    const clean = source.map(line => line.replace(/\u2800/g, ' '));
    const frame0 = clean.map(line => line.replace(/[^ ]/g, '0'));
    const frame1 = clean.map(line => line.replace(/[^ ]/g, '1'));
    return [frame0, frame1];
}

const ASCII_FRAMES = generateAsciiFrames(ASCII_ART_SOURCE);
let asciiFrame = 0;
setInterval(() => { asciiFrame = asciiFrame === 0 ? 1 : 0; }, 500);

// Warna acak monokrom (hitam, putih, abu-abu) untuk efek glitch
function randomMonochromeColor() {
    const v = Math.floor(Math.random() * 256); // 0-255
    return `rgb(${v},${v},${v})`; // grayscale
}

let currentGlitchColor = randomMonochromeColor();
setInterval(() => {
    currentGlitchColor = randomMonochromeColor();
}, 100);

function spawnParticle(cx, cy) {
    if (particles.length >= MAX_P) return;
    let speed = isFused ? 12 : 5;
    let angle = Math.random() * Math.PI * 2;
    let life  = isFused ? Math.random()*20+10 : Math.random()*30+20;
    particles.push({
        x: cx + (Math.random()*30-15),
        y: cy + (Math.random()*30-15),
        vx: Math.cos(angle)*speed*(Math.random()*0.6+0.4),
        vy: Math.sin(angle)*speed*(Math.random()*0.6+0.4) + (isFused ? 0 : 0.6),
        text: Math.random()>0.5 ? "1" : "0",
        life: life, maxLife: life
    });
}

btnStart.onclick = () => { overlay.style.display='none'; initSystem(); };
function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resizeCanvas);

function initSystem() {
    resizeCanvas();
    const handsAI = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    handsAI.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    handsAI.onResults(onHandResults);
    new Camera(video, {
        onFrame: async () => { await handsAI.send({image: video}); },
        width: 640,
        height: 480,
        facingMode: 'user'
    }).start();
}

function drawAsciiOnHand(hX, hY, hW, hH) {
    ctx.save();
    const lines = ASCII_FRAMES[asciiFrame];
    const fontSize = Math.max(8, Math.floor(hW / 45));
    const lineH = fontSize * 1.15;
    const totalH = lines.length * lineH;

    let boxX = hX;
    let boxY = hY - totalH - 20;
    const boxW = hW;
    const boxH = totalH + 14;

    if (boxY < 5) boxY = hY + hH + 10;
    if (boxX < 5) boxX = 5;
    if (boxX + boxW > canvas.width - 5) boxX = canvas.width - boxW - 5;

    // Warna dasar: putih jika normal, atau warna monokrom acak jika fusion
    const baseColor = isFused ? currentGlitchColor : '#ffffff';
    const glitchOffsetX = (isFused && Math.random() > 0.6) ? (Math.random()*8-4) : 0;
    const glitchOffsetY = (isFused && Math.random() > 0.6) ? (Math.random()*8-4) : 0;

    ctx.strokeStyle = baseColor;
    ctx.lineWidth = isFused ? 2.5 : 1.5;
    ctx.strokeRect(boxX + glitchOffsetX, boxY + glitchOffsetY, boxW, boxH);

    // Sudut dekoratif
    const cl = 10, ct = 2;
    ctx.fillStyle = baseColor;
    ctx.fillRect(boxX+glitchOffsetX, boxY+glitchOffsetY, cl, ct);
    ctx.fillRect(boxX+glitchOffsetX, boxY+glitchOffsetY, ct, cl);
    ctx.fillRect(boxX+boxW-cl+glitchOffsetX, boxY+glitchOffsetY, cl, ct);
    ctx.fillRect(boxX+boxW-ct+glitchOffsetX, boxY+glitchOffsetY, ct, cl);
    ctx.fillRect(boxX+glitchOffsetX, boxY+boxH-ct+glitchOffsetY, cl, ct);
    ctx.fillRect(boxX+glitchOffsetX, boxY+boxH-cl+glitchOffsetY, ct, cl);
    ctx.fillRect(boxX+boxW-cl+glitchOffsetX, boxY+boxH-ct+glitchOffsetY, cl, ct);
    ctx.fillRect(boxX+boxW-ct+glitchOffsetX, boxY+boxH-cl+glitchOffsetY, ct, cl);

    ctx.font = `${fontSize}px 'Share Tech Mono', monospace`;
    const charW = fontSize * 0.58;

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const y = boxY + 8 + i * lineH + fontSize + glitchOffsetY;
        const gx = (isFused && Math.random() > 0.8) ? (Math.random()*6-3) : 0;
        for (let ci = 0; ci < line.length; ci++) {
            const ch = line[ci];
            if (ch === ' ') continue;
            // Warna karakter: mengikuti baseColor (monokrom saat fusion)
            ctx.fillStyle = (ch === '1') ? baseColor : (isFused ? 'rgba(128,128,128,0.7)' : '#cccccc');
            const charGlitchX = (isFused && Math.random() > 0.9) ? (Math.random()*4-2) : 0;
            ctx.fillText(ch, boxX + 5 + ci * charW + gx + charGlitchX, y);
        }
    }
    ctx.restore();
}

function onHandResults(results) {
    frameCount++;

    // Getaran layar hanya saat fusion
    const shakeX = isFused ? (Math.random()*12-6) : 0;
    const shakeY = isFused ? (Math.random()*12-6) : 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(shakeX, shakeY);

    const videoW = (results.image?.videoWidth) || video.videoWidth || 640;
    const videoH = (results.image?.videoHeight) || video.videoHeight || 480;
    const videoRatio = videoW / videoH;
    const canRatio = canvas.width / canvas.height;
    let renderW, renderH, offsetX, offsetY;
    if (canRatio > videoRatio) {
        renderW = canvas.width;
        renderH = canvas.width / videoRatio;
        offsetX = 0;
        offsetY = (canvas.height - renderH) / 2;
    } else {
        renderW = canvas.height * videoRatio;
        renderH = canvas.height;
        offsetX = (canvas.width - renderW) / 2;
        offsetY = 0;
    }

    const detectedBoxes = [];
    const currentHandPoints = [];
    const openHandBoxes = [];

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (let hi = 0; hi < results.multiHandLandmarks.length; hi++) {
            const landmarks = results.multiHandLandmarks[hi];

            let xMin = canvas.width, xMax = 0, yMin = canvas.height, yMax = 0;
            for (let li = 0; li < landmarks.length; li++) {
                const pt = landmarks[li];
                const px = offsetX + ((1 - pt.x) * renderW);
                const py = offsetY + (pt.y * renderH);
                if (px < xMin) xMin = px;
                if (px > xMax) xMax = px;
                if (py < yMin) yMin = py;
                if (py > yMax) yMax = py;
            }

            const PAD = 28;
            const size = Math.max((xMax - xMin) + PAD*2, (yMax - yMin) + PAD*2);
            const cX = xMin + (xMax - xMin)/2;
            const cY = yMin + (yMax - yMin)/2;
            const hX = cX - size/2;
            const hY = cY - size/2;

            currentHandPoints.push({x: cX, y: cY});
            detectedBoxes.push({x: hX, y: hY, w: size, h: size});

            const j8 = landmarks[8], j5 = landmarks[5];
            const dist = Math.hypot(j8.x - j5.x, j8.y - j5.y);
            const isOpen = dist > 0.08;

            const wrist = landmarks[0];
            const tips = [4,8,12,16,20].map(i => landmarks[i]);
            let avgD = 0;
            tips.forEach(tip => avgD += Math.hypot(tip.x - wrist.x, tip.y - wrist.y));
            avgD /= 5;
            // Threshold tetap rendah agar mudah muncul
            const isFullOpen = avgD > 0.15;

            detectedBoxes[hi].isFullOpen = isFullOpen;

            // Gambar border tangan (putih)
            const col = '#ffffff';
            const lw = isFused ? 4 : 2.5;

            if (!isOpen) {
                ctx.strokeStyle = col;
                ctx.lineWidth = lw;
                ctx.strokeRect(hX, hY, size, size);
                const len = 16, thk = 4;
                ctx.fillStyle = col;
                ctx.fillRect(hX, hY, len, thk); ctx.fillRect(hX, hY, thk, len);
                ctx.fillRect(hX+size-len, hY, len, thk); ctx.fillRect(hX+size-thk, hY, thk, len);
                ctx.fillRect(hX, hY+size-thk, len, thk); ctx.fillRect(hX, hY+size-len, thk, len);
                ctx.fillRect(hX+size-len, hY+size-thk, len, thk); ctx.fillRect(hX+size-thk, hY+size-len, thk, len);
            } else {
                const layers = isFused ? 4 : 3;
                for (let li2 = 0; li2 < layers; li2++) {
                    const off = (li2*12) + Math.sin(frameCount*0.5)*4;
                    const alpha = 1 - li2*0.28;
                    ctx.save();
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(hX-off, hY-off, size+off*2, size+off*2);
                    ctx.restore();
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(hX-15, cY); ctx.lineTo(hX+size+15, cY);
                ctx.moveTo(cX, hY-15); ctx.lineTo(cX, hY+size+15);
                ctx.stroke();
            }

            // HUD kecil
            const hudW = 110, hudH = 34;
            let hudX = hX + size + 15, hudY = hY;
            if (hudX + hudW > canvas.width - 10) hudX = hX - hudW - 15;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(hudX, hudY, hudW, hudH);
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1;
            ctx.strokeRect(hudX, hudY, hudW, hudH);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 9px monospace';
            ctx.fillText('X: ' + Math.round(cX), hudX+8, hudY+13);
            ctx.fillText('Y: ' + Math.round(cY), hudX+8, hudY+25);
        }

        // Kumpulkan kotak tangan yang terbuka lebar
        for (const box of detectedBoxes) {
            if (box.isFullOpen) {
                openHandBoxes.push({x: box.x, y: box.y, w: box.w, h: box.h});
            }
        }
    }

    // Fusion detection: HANYA jika kedua kotak tumpang tindih (overlap), tidak berdasarkan jarak
    isFused = false;
    if (detectedBoxes.length === 2) {
        const b1 = detectedBoxes[0];
        const b2 = detectedBoxes[1];
        const overlap = b1.x < b2.x + b2.w && b1.x + b1.w > b2.x && b1.y < b2.y + b2.h && b1.y + b1.h > b2.y;
        isFused = overlap;  // hanya overlap, bukan closeEnough
    }

    // Partikel (monokrom saat fusion)
    for (const box of detectedBoxes) {
        const emit = isFused ? 10 : 3;
        for (let k = 0; k < emit; k++) spawnParticle(box.x+box.w/2, box.y+box.h/2);
    }

    ctx.save();
    ctx.font = `bold ${isFused ? 16 : 12}px monospace`;
    for (let p = particles.length-1; p >= 0; p--) {
        const particle = particles[p];
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.life--;
        const gx2 = Math.random() > 0.92 ? (Math.random()*16-8) : 0;
        if (Math.random() > 0.95) particle.text = particle.text === "1" ? "0" : "1";
        const prog = particle.life / particle.maxLife;
        // Warna partikel: putih jika normal, monokrom acak jika fusion
        const v = Math.floor(prog * 255);
        ctx.fillStyle = isFused ? `rgb(${v},${v},${v})` : `rgba(255,255,255,${prog})`;
        ctx.fillText(particle.text, particle.x+gx2, particle.y);
        if (particle.life <= 0) particles.splice(p, 1);
    }
    ctx.restore();

    // Glitch effects monokrom (hanya saat fusion)
    if (isFused && frameCount % 2 === 0) {
        // Garis horizontal acak hitam/putih
        const lineY = Math.random() * canvas.height;
        const lineH = Math.random() * 16 + 4;
        const grayVal = Math.floor(Math.random() * 256);
        ctx.fillStyle = `rgb(${grayVal},${grayVal},${grayVal})`;
        ctx.fillRect(0, lineY, canvas.width, lineH);

        // Garis tipis putih/hitam
        if (Math.random() > 0.5) {
            ctx.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000';
            ctx.fillRect(0, Math.random()*canvas.height, canvas.width, 1);
        }

        // Chromatic aberration palsu dengan offset monokrom
        ctx.save();
        ctx.globalAlpha = 0.1;
        ctx.drawImage(canvas, 4, 0);
        ctx.drawImage(canvas, -4, 0);
        ctx.restore();
    }

    // Gambar ASCII art (tanpa background hitam)
    for (const ob of openHandBoxes) {
        drawAsciiOnHand(ob.x, ob.y, ob.w, ob.h);
    }

    // Garis penghubung antar tangan (jika ada dua)
    if (currentHandPoints.length === 2) {
        const hp1 = currentHandPoints[0], hp2 = currentHandPoints[1];
        ctx.save();
        if (isFused) {
            const lc2 = Math.floor(Math.random()*5)+2;
            for (let g = 0; g < lc2; g++) {
                const gOff = (g - lc2/2) * 9;
                ctx.lineWidth = Math.random()*3+1;
                ctx.strokeStyle = currentGlitchColor;
                ctx.beginPath();
                ctx.moveTo(hp1.x+gOff, hp1.y+gOff);
                ctx.lineTo(hp2.x+gOff, hp2.y+gOff);
                ctx.stroke();
            }
        } else {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.setLineDash([12,10,4,10]);
            ctx.lineDashOffset = -frameCount*2;
            ctx.beginPath();
            ctx.moveTo(hp1.x, hp1.y);
            ctx.lineTo(hp2.x, hp2.y);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        const mx = (hp1.x+hp2.x)/2, my = (hp1.y+hp2.y)/2;
        ctx.fillStyle = isFused ? currentGlitchColor : '#ffffff';
        ctx.beginPath(); ctx.arc(mx, my, isFused ? 6 : 4, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = isFused ? 'rgba(128,128,128,0.3)' : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(mx, my, isFused ? 14 : 10, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }

    // Banner fusion (monokrom)
    if (isFused) {
        ctx.save();
        ctx.fillStyle = 'rgba(128,128,128,0.15)';
        ctx.fillRect(0, canvas.height/2-20, canvas.width, 40);
        ctx.strokeStyle = 'rgba(128,128,128,0.4)';
        ctx.lineWidth = 1;
        ctx.strokeRect(0, canvas.height/2-20, canvas.width, 40);
        if (frameCount % 4 !== 0) {
            ctx.fillStyle = currentGlitchColor;
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('[ FUSION MODE ACTIVE тАФ DUAL HAND LOCK ]', canvas.width/2, canvas.height/2+4);
            ctx.textAlign = 'left';
        }
        ctx.restore();
    }

    // Bottom HUD
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '8px monospace';
    ctx.fillText('FRAME: ' + frameCount, 14, canvas.height-30);
    ctx.fillText('HANDS: ' + detectedBoxes.length + '  |  PARTICLES: ' + particles.length + '  |  FUSION: ' + (isFused?'ON':'OFF') + '  |  ASCII: ' + asciiFrame, 14, canvas.height-18);
    ctx.restore();

    ctx.restore();
}
</script>
